# Rebind Prefix
unbind C-b
set -g prefix C-a
set -g mouse on
bind-key -r C-a send-prefix
# LazyVim recommends
set -sg escape-time 10
set-option -sg escape-time 10
set-option -g focus-events on
# Extended keys (needed for Shift+Enter detection)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# Reload config
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"
# Map Shift+Enter to Alt+Enter (newline in Claude Code)
bind -n S-Enter send-keys M-Enter
#Terminal Colors and Bar
set-option -g default-terminal "screen-256color"
set-option -g status-position top

# Tmux count starting at 1 > 0 for easier key/mind map
set-option -g base-index 1
set-option -g renumber-windows on

# clipboard settings
# iOS iterm2 - https://github.com/tmux-plugins/tmux-yank?tab=readme-ov-file
# set-option -g default-command "reattach-to-user-namespace -l $SHELL"
set-option -g set-clipboard on
set -g @yank_with_mouse on

# History Limit Increase
set -g history-limit 10000

# Rebind Zoom
bind-key C-z resize-pane -Z

# Terminator like Pane split
bind-key -n C-o split-window -v -c "#{pane_current_path}"
bind-key -n C-e split-window -h -c "#{pane_current_path}"

# Vim Like Pane Navigation
bind-key C-h select-pane -L
bind-key C-j select-pane -D
bind-key C-k select-pane -U
bind-key C-l select-pane -R

# Resize Panes
bind-key -r H resize-pane -L 10
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 10


# Window Settings
# bind c new-window -c "#{pane_current_path}"
# breaks pane to new-window
# bind-key b break-pane -d

# Session Settings
bind-key p choose-tree

# Themes and Packages
# prefix + I (install) U for update
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm'
# Theme Settings
set -g @catppuccin_flavour 'mocha' # latte frappe, macchiato, mocha
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
# TODO: Custom Module that uses tmux-cpu to show both cpu, mem, gpu
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_modules_right "directory cpu date_time" # user host
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_date_time_text "%a %b %d, %I:%M:%S %p"
set -g @catppuccin_directory_text "#{pane_current_path}"
set -g @catppuccin_window_default_color "#{thm_blue}" # text color
set -g @catppuccin_window_default_background "#{thm_gray}"

set -g @catppuccin_pane_color "#{thm_orange}"
set -g @catppuccin_pane_background_color "#{thm_orange}"
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
set-option -g remain-on-exit on
